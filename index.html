<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover  → content extends behind the iPhone notch/dynamic island.
      Required for black-translucent status bar on iOS to look correct.
      ⚠️  When using this, add padding-top: env(safe-area-inset-top) to your
          header/AppLayout so content doesn't hide behind the status bar.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>WorkLedger</title>
    <meta
      name="description"
      content="Contract-aware work reporting for field technicians"
    />

    <!-- ================================================================
         STANDARD PWA
    ================================================================ -->

    <!-- Chrome / Android uses this for the tab/toolbar colour -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Web App Manifest — Android Chrome install criteria + shortcuts -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ================================================================
         iOS / APPLE — CRITICAL
         Safari does NOT fully read the manifest. Every tag below is
         required for proper iOS home screen installation behaviour.
    ================================================================ -->

    <!--
      Enables standalone (full-screen) mode when launched from home screen.
      Without this, iOS opens the URL in Safari with address bar visible.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!--
      Controls the iOS status bar appearance in standalone mode.
        "default"             → white status bar, content starts below it
        "black"               → black status bar, content starts below it
        "black-translucent"   → status bar overlaps content (need safe-area CSS)
      We use black-translucent for the cleanest look on modern iPhones.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!--
      The name shown below the icon on the iOS home screen.
      Defaults to <title> if omitted, but explicit is safer.
    -->
    <meta name="apple-mobile-web-app-title" content="WorkLedger" />

    <!--
      Apple Touch Icons — Safari reads these link tags, NOT the manifest icons.
      Rules:
        - PNG only, no transparency (transparent = black background)
        - Do NOT add rounded corners yourself — iOS adds them automatically
        - Solid #0f172a background with logo centred
      iOS picks the closest size automatically. The 180×180 fallback covers
      all modern iPhones. Explicit sizes are recommended for precision.
    -->
    <!-- Generic fallback (required) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <!-- iPhone (Retina, @3x) — iPhone 8 and newer -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <!-- iPad Pro -->
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <!-- iPad, iPad mini -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <!-- iPhone Retina (@2x, legacy — iPhone 5/6/7/8) -->
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />
    <!-- iPad non-Retina (legacy) -->
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/apple-touch-icon-76.png" />

    <!-- ================================================================
         iOS SPLASH SCREENS (Launch Images)
         Without these, iOS shows a blank white screen for 1–2 seconds
         while the app JS loads. With them, it shows a branded splash.

         Each <link> targets a specific device via a CSS media query.
         The query matches: device-width × device-height × pixel-ratio.

         ⚠️  Generate these with pwa-asset-generator (see README):
             npx pwa-asset-generator logo-source-1024.png ./public \
               --background "#0f172a" --padding "20%"

         Store all splash PNGs in /public/splash/
    ================================================================ -->

    <!-- iPhone 14 Pro Max (430×932 @3x → 1290×2796px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1290x2796.png"
    />

    <!-- iPhone 14 Pro (393×852 @3x → 1179×2556px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1179x2556.png"
    />

    <!-- iPhone 14 Plus / 13 Pro Max / 12 Pro Max (428×926 @3x → 1284×2778px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1284x2778.png"
    />

    <!-- iPhone 14 / 13 / 13 Pro / 12 / 12 Pro (390×844 @3x → 1170×2532px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1170x2532.png"
    />

    <!-- iPhone 13 mini / 12 mini (375×812 @3x → 1125×2436px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1125x2436.png"
    />

    <!-- iPhone 11 Pro Max / XS Max (414×896 @3x → 1242×2688px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1242x2688.png"
    />

    <!-- iPhone 11 / XR (414×896 @2x → 828×1792px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-828x1792.png"
    />

    <!-- iPhone 11 Pro / XS / X (375×812 @3x — same as 13 mini above) -->
    <!-- Covered by the splash-1125x2436.png entry above -->

    <!-- iPhone 8 Plus / 7 Plus / 6s Plus / 6 Plus (414×736 @3x → 1242×2208px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1242x2208.png"
    />

    <!-- iPhone SE (2nd/3rd gen) / 8 / 7 / 6s / 6 (375×667 @2x → 750×1334px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-750x1334.png"
    />

    <!-- iPad Pro 12.9" (3rd–6th gen) (1024×1366 @2x → 2048×2732px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-2048x2732.png"
    />

    <!-- iPad Pro 11" (1st–4th gen) / iPad Air 4th–5th gen (834×1194 @2x → 1668×2388px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-1668x2388.png"
    />

    <!-- iPad Air (4th gen, non-Pro 11") (820×1180 @2x → 1640×2360px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-1640x2360.png"
    />

    <!-- iPad (10th gen) (810×1080 @2x → 1620×2160px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-1620x2160.png"
    />

    <!-- iPad mini (6th gen) (744×1133 @2x → 1488×2266px) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-1488x2266.png"
    />

    <!-- ================================================================
         OTHER PLATFORM META
    ================================================================ -->

    <!-- Prevent iOS from auto-linking phone numbers in text -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Microsoft / Edge tile (legacy but harmless) -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- ================================================================
         FAVICONS
         Modern browsers use SVG; older browsers fall back to PNG.
         Generate favicon-32x32.png and favicon-16x16.png from your logo.
    ================================================================ -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  </head>

  <body>
    <div id="root"></div>

    <!--
      PWA Install Prompt — Global Capture Script
      ============================================
      MUST run before React loads (type="module" is deferred by default).
      This plain <script> runs synchronously, guaranteeing we catch
      beforeinstallprompt even if it fires before React mounts.

      The event is stored on window.__pwaInstallPrompt so that
      PWAInstallButton.jsx can read it immediately on mount.

      Without this, the event fires into the void when React hasn't
      yet attached its listener — the install button never appears.
    -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        console.log('[PWA] beforeinstallprompt captured globally');
      });
      window.addEventListener('appinstalled', function() {
        window.__pwaInstallPrompt = null;
        console.log('[PWA] App installed — prompt cleared');
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
